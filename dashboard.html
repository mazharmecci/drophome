<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drophome Dashboard</title>
  <link rel="stylesheet" href="../styles/style.css" />
</head>
<body>
  
  <h2>Drophome Dashboard</h2>

  <div>
    <label for="collectionSelect">Select Collection:</label>
    <select id="collectionSelect">
      <option value="outboundOrders">Outbound Orders</option>
      <option value="inboundInventory">Inbound Inventory</option>
      <option value="stockAvailability">Stock Availability</option>
    </select>

    <input type="text" id="filterInput" placeholder="Filter by SKU or Name" />
    <button onclick="loadData()">Load Records</button>
  </div>

  <table id="dataTable">
    <thead>
      <tr>
        <th>Order Number</th>
        <th>Status</th>
        <th>Quantity</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <table id="stockTable">
    <thead>
      <tr>
        <th>SKU</th>
        <th>Product Name</th>
        <th>Available Quantity</th>
        <th>Location</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  
  <script src="../firebase.js"></script>
  <script src="../scripts/dashboard.js"></script>
  <script src="../scripts/stockDashboard.js" type="module"></script>
</body>
</html>
