<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inbound Form</title>
  <link rel="stylesheet" href="../styles/style.css" />
</head>
<body>
  <h2>Inbound Inventory Form</h2>
  <form id="inboundForm">
    <input type="text" name="inboundId" placeholder="Inbound ID" required />
    <input type="date" name="dateReceived" required />
    <input type="text" name="supplierName" placeholder="Supplier Name" required />
    <input type="text" name="sku" placeholder="SKU" required />
    <input type="text" name="productName" placeholder="Product Name" required />
    <input type="number" name="quantityReceived" placeholder="Quantity Received" required />
    <input type="text" name="storageLocation" placeholder="Storage Location" />
    <textarea name="receivingNotes" placeholder="Receiving Notes"></textarea>
    <button type="submit">Submit</button>
  </form>

  <script src="../firebase.js"></script>
  <script src="../scripts/inbound.js"></script>
</body>
</html>
