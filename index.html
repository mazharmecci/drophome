<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drophome Dashboard</title>
  <link rel="stylesheet" href="./styles/style.css" />
  <script type="module" src="./firebase.js"></script>
  <style>
    .main-content {
      margin-left: 290px;
      padding: 40px;
      min-height: 100vh;
      background: #f3f7fa;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 12px #0001;
    }

    #loader {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      color: #274a7c;
      background: #eaf4ff;
      padding: 10px 20px;
      border-radius: 6px;
      box-shadow: 0 0 10px #0001;
      display: none;
    }
  </style>
</head>
<body onload="loadContent('./dashboard.html')">
  <!-- Sidebar Navigation -->
  <div class="sidebar">
    <h2>DROPHOME</h2>

    <button class="toggle-header" onclick="toggleSection('formsSection')">
      Forms <span id="arrowForms">▲</span>
    </button>
    <ul id="formsSection">
      <li><a href="#" onclick="loadContent('./forms/inbound.html')">Inbound Form</a></li>
      <li><a href="#" onclick="loadContent('./forms/outbound.html')">Outbound Form</a></li>
      <li><a href="#" onclick="loadContent('./forms/stock.html')">Stock Availability Form</a></li>
    </ul>

    <button class="toggle-header" onclick="toggleSection('dashboardSection')">
      Dashboard <span id="arrowDashboard">▲</span>
    </button>
    <ul id="dashboardSection">
      <li><a href="#" onclick="loadContent('./dashboard.html')">Dashboard Overview</a></li>
    </ul>

    <!-- Other sections omitted for brevity -->
  </div>

  <!-- Main Content Pane -->
  <div class="main-content">
    <h1 id="moduleTitle">Dashboard Module</h1>
    <div id="loader">Loading module...</div>
    <iframe id="contentFrame" src="" onload="hideLoader()"></iframe>
  </div>

  <!-- Script -->
  <script>
    function toggleSection(sectionId) {
      const list = document.getElementById(sectionId);
      const arrow = document.getElementById("arrow" + sectionId.replace("Section", ""));
      if (list.classList.contains("closed")) {
        list.classList.remove("closed");
        arrow.textContent = "▲";
      } else {
        list.classList.add("closed");
        arrow.textContent = "▼";
      }
    }

    function loadContent(url) {
      const loader = document.getElementById("loader");
      const frame = document.getElementById("contentFrame");
      const title = url.split("/").pop().replace(".html", "").replace(/-/g, " ");
      document.getElementById("moduleTitle").textContent = title.charAt(0).toUpperCase() + title.slice(1) + " Module";

      loader.style.display = "block";
      frame.src = url;
    }

    function hideLoader() {
      document.getElementById("loader").style.display = "none";
    }

    ["formsSection", "dashboardSection"].forEach(id => {
      document.getElementById(id).classList.remove("closed");
    });
  </script>
</body>
</html>
